name: bluebuild
on:
  schedule:
    - cron:
        "00 06 * * *" # build at 06:00 UTC every day
        # (20 minutes after last ublue images start building)
  push:
    paths-ignore: # don't rebuild if only documentation has changed
      - "**.md"

  pull_request:
  workflow_dispatch: # allow manually triggering builds
concurrency:
  # only run one build at a time
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true
jobs:
  bluebuild:
    name: Build Custom Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false # stop GH from cancelling all matrix builds if one fails
      matrix:
        recipe:
          # !! Add your recipes here
          - recipe-distrobox.yml
          - recipe-desktop.yml
          - recipe-nixdesktop.yml
          - recipe-boxen.yml
          - recipe-steamdeck.yml
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Verify base image signature
        env:
          RECIPE: ${{ matrix.recipe }}
        run: |
          set -euo pipefail

          BASE_IMAGE=$(yq '.base-image' "./recipes/${RECIPE}")
          IMAGE_VERSION=$(yq '.image-version' "./recipes/${RECIPE}")
          REF="${BASE_IMAGE}:${IMAGE_VERSION}"
          echo "Base image: $REF"

          case "$BASE_IMAGE" in

            ghcr.io/ublue-os/*)
              echo "==> cosign verify (ublue-os key)"
              cosign verify \
                --key ./cosign-keys/ublue-os.pub \
                "$REF" | jq
              ;;

            ghcr.io/blue-build/*)
              echo "==> cosign verify (blue-build key)"
              cosign verify \
                --key ./cosign-keys/blue-build.pub \
                "$REF" | jq
              ;;

            registry.fedoraproject.org/*)
              echo "==> skopeo + GPG policy verify (Fedora key)"
              KEY="$(realpath ./cosign-keys/fedora.gpg)"
              POLICY_DIR=$(mktemp -d)

              cat > "${POLICY_DIR}/policy.json" <<EOF
          {
            "default": [{"type": "reject"}],
            "transports": {
              "docker": {
                "registry.fedoraproject.org": [{
                  "type": "signedBy",
                  "keyType": "GPGKeys",
                  "keyPath": "${KEY}"
                }]
              }
            }
          }
          EOF

              mkdir -p "${POLICY_DIR}/registries.d"
              cat > "${POLICY_DIR}/registries.d/fedora.yaml" <<EOF
          docker:
            registry.fedoraproject.org:
              sigstore: https://registry.fedoraproject.org/containers/sigstore
          EOF

              skopeo --policy "${POLICY_DIR}/policy.json" \
                     --registries.d "${POLICY_DIR}/registries.d" \
                     inspect "docker://${REF}" > /dev/null
              echo "Signature OK"
              ;;

            quay.io/fedora/fedora-coreos)
              echo "==> Skipping verification: FCOS does not publish container signatures."
              echo "    Consider pinning image-version to a sha256 digest instead."
              ;;

            *)
              echo "::error::No verification configured for base image: ${BASE_IMAGE}"
              exit 1
              ;;
          esac
      - name: Build Custom Image
        uses: blue-build/github-action@v1.11
        with:
          recipe: ${{ matrix.recipe }}
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          verify_install: true

          # enabled by default, disable if your image is small and you want faster builds
          maximize_build_space: true
