modules:
  - type: dnf
    repos:
      files:
        - brave-browser.repo
        - dangerzone.repo
        - achno-gowall.repo
      keys:
        - keys/brave-core.asc
        - keys/fpf-yum-tools-archive-keyring.gpg
        - keys/achno-gowall.gpg
    install:
      packages:
        - brave-browser
        - mpv
        - mpv-mpris
        - skanpage
        - gowall
        - dangerzone
        - google-noto-emoji-fonts
        - wezterm
        - rio
        - xdg-terminal-exec
    remove:
      packages:
        # "firefox" is the main package, "firefox-langpacks" is a dependency
        - firefox
        - firefox-langpacks # also remove firefox dependency (not required for all packages, this is a special case)
        - zram-generator
        - zram-generator-defaults

  - type: fonts
    fonts:
      nerd-fonts:
        - Hack
