modules:
  - type: dnf
    source: ghcr.io/rulentwave/modules/dnf:latest
    repos:
      keys:
        - keys/microsoft.asc
        - keys/obs-systemd.asc
    install:
      packages:
        - rustup
        - perl
        - black
        - python3-isort
        - python3-yapf
        - arm-none-eabi-binutils-cs
        - arm-none-eabi-gcc-cs
        - arm-none-eabi-gcc-cs-c++
        - arm-none-eabi-newlib
        - avr-binutils
        - avr-gcc
        - avr-gcc-c++
        - avr-libc
        - avrdude
        - clang
        - clang-tools-extra
        - dfu-util
        - kernel-devel
        - android-tools
        - pipx
        - opam
        - python3-pandas
        - java-latest-openjdk-devel
        - python3-ramalama
        - butane
        - ansible
        - ansible-collection-community-general
        - code
        - kdbg
        - flatpak-builder
        - ninja-build
        - fedpkg
        - fedora-packager
        - copr-cli
        - rpm-build
        - rpmdevtools
        - tito
        - dotnet-sdk-10.0
        - azure-cli
        - azure-vm-utils
        - meson
        - golang
        - python3-jinja2-cli
        - gnome-boxes
        - libvirt
        - virt-install
    group-install:
      with-optional: false
      packages:
        - c-development
        - development-tools
    builddep:
      packages:
        - mpv
