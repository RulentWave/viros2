modules:
  - type: dnf
    repos:
      keys:
        - keys/microsoft.asc
        - keys/obs-systemd.asc
    install:
      packages:
        - rustup
        - black
        - python3-isort
        - python3-yapf
        - pipx
        - python3-pandas
        - python3-ramalama
        - butane
        - ansible
        - ansible-collection-community-general
        - flatpak-builder
        - ninja-build
        - fedpkg
        - fedora-packager
        - copr-cli
        - rpm-build
        - rpmdevtools
        - tito
        - dotnet-sdk-10.0
        - azure-cli
        - azure-vm-utils
        - meson
        - golang
        - python3-jinja2-cli
        - zed
        - ollama
        - anda
        - tokei
        - terra-mock-configs
        - rpm-sign
        - zola
        - coreos-installer
        - rust2rpm
    group-install:
      with-optional: false
      packages:
        - c-development
        - development-tools
    builddep:
      packages:
        - mpv
