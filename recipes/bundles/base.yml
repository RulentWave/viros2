modules:
  - type: files
    files:
      - source: system
        destination: / # copies files/system/* (* means everything inside it) into your image's root folder /

  - type: dnf
    repos:
      files:
        - negativo17/fedora-multimedia.repo
      keys:
        - keys/RPM-GPG-KEY-slaanesh.asc
    replace:
      - from-repo: fedora-multimedia
        skip-unavailable: true
        packages:
          - libva
          - mesa-dri-drivers
          - mesa-filesystem
          - mesa-libEGL
          - mesa-libGL
          - mesa-libgbm
          - mesa-va-drivers
          - mesa-vulkan-drivers
          - libheif
  # x86_64 packages only, hence why skip-unavailable is set
  - type: dnf
    install:
      packages:
        - repo: fedora-multimedia
          skip-unavailable: true
          packages:
            - intel-vaapi-driver
    replace:
      - from-repo: fedora-multimedia
        skip-unavailable: true
        packages:
          - libva-intel-media-driver
          - intel-gmmlib
          - intel-mediasdk
          
  - type: dnf
    install:
      packages:
        - libopenjph # Manually install dependency for `libheif`, as Negativo upstreamed it
        - repo: fedora-multimedia
          packages:
            - libva-utils
            - pipewire-libs-extra
            - heif-pixbuf-loader
    replace:
      - from-repo: fedora-multimedia
        packages:
          - old: ffmpeg-free
            new: ffmpeg
          - old: libfdk-aac-free
            new: libfdk-aac
          - old: libavcodec-free
            new: libavcodec


  - type: dnf
    repos:
      files:
        - tailscale.repo
        - gemfury-nushell.repo
      keys:
        - keys/tailscale-fedora-repo.gpg
        - keys/gemfury-nushell.key
    install:
      packages:
        - distrobox
        - chezmoi
        - zsh
        - oh-my-posh
        - zoxide
        - uutils-coreutils
        - btrfsmaintenance
        - duperemove
        - yt-dlp
        - neovim
        - luarocks
        - clevis
        - clevis-luks
        - clevis-dracut
        - clevis-udisks2
        - clevis-systemd
        - gh
        - fping
        - fd-find
        - telnet
        - netcat
        - btop
        - wireshark-cli
        - nushell
        - tmux
        - tailscale
        - 7zip
        - 7zip-standalone-all
        - smartmontools
        - pam-u2f
        - pam_yubico
